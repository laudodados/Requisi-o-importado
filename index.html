<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gerador de Laudo Técnico - Robôs</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* --- ESTILO GERAL E CORES --- */
    :root {
      --cor-primaria: #007bff;
      --cor-fundo: #8ad6cf;
      --cor-card: #ffffff;
      --cor-borda: #dee2e6;
      --cor-sombra: rgba(0, 0, 0, 0.1);
      --cor-texto: #495057;
      --cor-titulo: #212529;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
    }

    #loader-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.8);
      display: none; justify-content: center; align-items: center; z-index: 9999;
      flex-direction: column; font-weight: bold; color: var(--cor-primaria);
    }

    .form-section {
      border: 1px solid var(--cor-borda); padding: 20px; margin: 20px 0; 
      border-radius: 8px; background-color: var(--cor-card); box-shadow: 0 4px 8px var(--cor-sombra);
    }
    .form-group { margin-bottom: 15px; }
    .form-row { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; }
    label, .form-group > span { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="date"], input[type="time"], select, textarea {
      width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--cor-borda);
      font-size: 16px; box-sizing: border-box; transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--cor-primaria); outline: none; }
    textarea { resize: vertical; }

    .checkbox-group label { display: inline-flex; width: auto; margin-right: 20px; font-weight: normal; }

    #btnGerarLaudo {
      width: 100%; padding: 15px; font-size: 18px; background-color: #28a745;
      color: white; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s ease-in-out;
    }
    #btnGerarLaudo:hover { background-color: #218838; }

    /* CSS DA PEÇA E PLACEHOLDER */
    .peca-img { 
      width: 60px; height: 60px; margin-right: 15px; object-fit: cover; border-radius: 8px; 
      border: 1px solid var(--cor-borda); background: #fff; flex-shrink: 0;
    }
    .peca-img-placeholder { 
      width: 60px; height: 60px; margin-right: 15px; border-radius: 8px; border: 1px solid var(--cor-borda); 
      background: #f8f9fa; display: flex; align-items: center; justify-content: center; 
      font-size: 20px; font-weight: bold; color: #adb5bd; flex-shrink: 0; text-transform: uppercase;
    }

    #pecasLista label {
      display: flex; width: 100%; align-items: center; margin-bottom: 10px;
      padding: 10px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s ease-in-out;
    }
    #pecasLista label:hover { background-color: #f8f9fa; border-color: var(--cor-borda); }
    #pecasLista h4 { margin-top: 20px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--cor-primaria); color: var(--cor-titulo); }
    
    .peca-item { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; margin-bottom: 15px; }
    .opcoes-peca { display: none; align-items: center; gap: 20px; }

    .cor-selecao { display: flex; gap: 5px; border: 1px solid var(--cor-borda); padding: 5px; border-radius: 8px; background-color: #f8f9fa; }
    .cor-selecao label { font-weight: normal; cursor: pointer; padding: 5px 10px; border-radius: 4px; border: 1px solid transparent; transition: all 0.2s; }
    .cor-selecao label:hover { background-color: #e9ecef; }
    .cor-selecao input[value="verde"]:checked + label { background-color: #d4edda; color: #155724; border-color: #b1dfbb; font-weight: bold; }
    .cor-selecao input[value="azul"]:checked + label { background-color: #cce5ff; color: #004085; border-color: #b8daff; font-weight: bold; }
    .cor-selecao input[value="rosa"]:checked + label { background-color: #ebacdd; color: #ed3cc5; border-color: #f5c6cb; font-weight: bold; }
    .cor-selecao input[type="radio"] { display: none; }

    .quantidade-label { display: flex; align-items: center; gap: 8px; font-weight: normal; }
    .quantidade-input { width: 40px; padding: 8px; text-align: center; }
    .peca-info-texto { display: flex; flex-direction: column; gap: 6px; }

    .estoque-badge {
      display: inline-flex; align-items: center; width: fit-content; padding: 4px 8px;
      border-radius: 999px; font-size: 13px; font-weight: bold; border: 1px solid var(--cor-borda);
      background-color: #eef2f7; color: #334155;
    }
    .peca-item.estoque-baixo .estoque-badge { background-color: #fff3cd; border-color: #ffecb5; color: #664d03; }
    .peca-item.estoque-zerado .estoque-badge { background-color: #f8d7da; border-color: #f5c2c7; color: #842029; }
    .peca-item.estoque-zerado .peca-info, .peca-item.estoque-baixo .peca-info { border-color: currentColor; }

    #previewFotos { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .preview-img { width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid var(--cor-borda); }
    .hidden { display: none; }
  

    /* ============================================================
       VISUAL ATUALIZADO — aplicado sobre a versão corrigida
    ============================================================ */
    :root {
      --navy-950: #071a33;
      --navy-900: #0b2d52;

    #laudoForm {
      width: min(880px, calc(100% - 32px));
      margin: -38px auto 0;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-section {
      width: 100%;
      margin: 0 !important;
      padding: 26px 28px 28px !important;
      background: var(--card-dark) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 18px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18) !important;
      color: var(--text-main) !important;

    }

    .form-section h2 {
      margin: 0 0 20px !important;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(59, 139, 212, 0.22);
      color: var(--text-main) !important;
      font-family: var(--font-display);
      font-size: 18px !important;
      font-weight: 800 !important;
      letter-spacing: -0.2px;
    }

    .form-group {
      margin-bottom: 15px !important;
    }

    .form-row {
      display: grid !important;
      grid-template-columns: 1fr 1.4fr !important;
      gap: 18px !important;
    }

    label,
    .form-group > span {
      display: block;
      margin-bottom: 7px !important;
      color: var(--text-soft) !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      letter-spacing: 0.1px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select,
    textarea {
      width: 100% !important;
      min-height: 44px;
      padding: 11px 14px !important;
      border: 1.5px solid var(--field-border) !important;
      border-radius: 8px !important;
      outline: none !important;
      background-color: var(--field-dark) !important;
      color: var(--text-main) !important;
      font-family: var(--font-ui) !important;

      box-shadow: 0 1px 2px rgba(0,0,0,0.12) !important;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease !important;
    }

    input[readonly] {
      background-color: #20252a !important;
      color: #aeb7c1 !important;
      cursor: not-allowed !important;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      background-color: var(--field-focus) !important;
      border-color: var(--blue-400) !important;
      box-shadow: 0 0 0 4px rgba(59,139,212,0.14) !important;
    }

    input::placeholder,
    textarea::placeholder {
      color: #737b83 !important;
    }

    /* Setas dos selects corrigidas */
    select {
      appearance: none !important;
      -webkit-appearance: none !important;
      -moz-appearance: none !important;
      padding-left: 14px !important;
      padding-right: 44px !important;
      background-image:
        linear-gradient(45deg, transparent 50%, #8fa3bd 50%),
        linear-gradient(135deg, #8fa3bd 50%, transparent 50%) !important;
      background-position:
        calc(100% - 22px) 50%,
        calc(100% - 15px) 50% !important;
      background-size:
        7px 7px,
        7px 7px !important;
      background-repeat: no-repeat !important;
    }

    select::-ms-expand {
      display: none;
    }

    select:focus {
      background-image:
        linear-gradient(45deg, transparent 50%, #3b8bd4 50%),
        linear-gradient(135deg, #3b8bd4 50%, transparent 50%) !important;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 4px;
    }

    .checkbox-group label {
      display: inline-flex !important;
      align-items: center;
      gap: 9px;
      width: auto !important;
      margin: 0 !important;
      padding: 9px 15px 9px 11px !important;
      background: #20252a !important;
      border: 1.5px solid var(--field-border) !important;
      border-radius: 999px !important;
      box-shadow: none !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      color: var(--text-soft) !important;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, color 0.14s ease;
    }

    .checkbox-group label:hover {
      border-color: var(--blue-400) !important;
      color: #fff !important;
      background: #232c33 !important;
    }

    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      margin: 0;
      border-radius: 5px;
      background: #0f1417;
      border: 1.6px solid #46576b;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.14s ease;
    }

    input[type="checkbox"]:checked {
      background: var(--blue-500);
      border-color: var(--blue-400);
    }

    input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 6px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* Componentes maiores */
    #pecasLista {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)) !important;
      gap: 16px !important;
      margin-top: 4px;
    }

    #pecasLista h4 {
      grid-column: 1 / -1;
      margin: 10px 0 0 !important;
      padding: 0 0 8px !important;
      border-bottom: 1px solid rgba(59,139,212,0.22) !important;
      color: #8fb8e6 !important;
      font-size: 12.5px !important;
      font-weight: 800 !important;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .peca-item {
      display: flex !important;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px !important;

      padding: 14px !important;
      margin: 0 !important;
      background: #20252a !important;
      border: 1.5px solid rgba(59,139,212,0.18) !important;
      border-radius: 12px !important;

    .peca-item:hover {

    }

    }

    #pecasLista label {
      border: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      background: transparent !important;
    }

    .peca-info {
      display: flex !important;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px !important;
      width: 100%;
      font-size: 13.5px !important;
      font-weight: 700;
      color: var(--text-main) !important;
    }

    .peca-info input[type="checkbox"] {
      align-self: flex-end;
    }

    .peca-img,
    .peca-img-placeholder {
      width: 100% !important;
      height: 118px !important;
      margin: 0 !important;
      object-fit: contain !important;
      border-radius: 8px !important;
      background: #fff !important;
      border: 1px solid rgba(255,255,255,0.10) !important;
      box-shadow: none !important;
      padding: 8px !important;
    }

    .peca-img {

    }

    .peca-img-placeholder {
      display: flex !important;
      align-items: center;
      justify-content: center;
      color: #5b6b82 !important;
      font-size: 30px !important;

    }

    .peca-info-texto {

    }

    .peca-item.estoque-baixo .estoque-badge {

    .opcoes-peca {
      display: none;

    .quantidade-label {

    #previewFotos {

      gap: 12px !important;
      margin-top: 14px !important;

    }

    input[type="file"] {
      width: 100%;
      min-height: 44px;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1.5px dashed var(--field-border);

      cursor: pointer;
    }

    #btnGerarLaudo {
      width: min(280px, 100%) !important;
      align-self: flex-end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 28px !important;

      background: rgba(7, 26, 51, 0.82) !important;

    }

    .hidden {
      display: none !important;
    }

    /* Visualização em tela cheia das imagens dos componentes */
    .image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      z-index: 99999;
    }

    .image-lightbox.show {
      display: flex;
    }

    .image-lightbox-content {
      position: relative;
      width: min(920px, 96vw);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .image-lightbox img {
      max-width: 100%;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 16px;
      background: #ffffff;
      padding: 14px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    .image-lightbox-title {
      max-width: 100%;
      color: #ffffff;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .image-lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: #ffffff;
      color: #111827;
      font-size: 25px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .image-lightbox-close:hover {
      filter: brightness(0.94);
    }

    @media (max-width: 860px) {
      #laudoForm {
        margin-top: -26px;
      }

      .form-section {
        padding: 20px 18px 22px !important;
      }

      .form-row {
        grid-template-columns: 1fr !important;

        <label for="fotos">Carregar fotos (múltiplas):</label>

        <div id="previewFotos"></div>
      </div>

    <button type="button" id="btnGerarLaudo" onclick="gerarLaudo()">Gerar Laudo Técnico</button>

<script>
// --- CONFIGURAÇÃO DOS SERVIÇOS (Mão de Obra Fixa) ---
const tabelaServicos = {
    residencial: [
        { nivel: "Simples",  codigo: "27792", desc: "SERVIÇO CONSERTO ROBÔ RES NL1", detalhe: "Serviços de manutenção corretiva e preventiva (Fonte, Filtro e Limpeza)." },
        { nivel: "Moderado", codigo: "27793", desc: "SERVIÇO CONSERTO ROBÔ RES NL2", detalhe: "Serviços de manutenção corretiva (Motor e Cabo)." },
        { nivel: "Complexo", codigo: "27794", desc: "SERVIÇO CONSERTO ROBÔ RES NL3", detalhe: "Serviços de manutenção corretiva (Engrenagens, Carenagem e Correias)." }
    ],
    comercial: [
        { nivel: "Simples",  codigo: "27789", desc: "SERVIÇO CONSERTO ROBÔ COML NL1", detalhe: "Serviços de manutenção corretiva e preventiva (Fonte, Filtro e Limpeza)." },
        { nivel: "Moderado", codigo: "27790", desc: "SERVIÇO CONSERTO ROBÔ COML NL2", detalhe: "Serviços de manutenção corretiva (Motor e Cabo)." },
        { nivel: "Complexo", codigo: "27791", desc: "SERVIÇO CONSERTO ROBÔ COML NL3", detalhe: "Serviços de manutenção corretiva (Engrenagens, Carenagem e Correias)." }
    ]
};

const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby71jdg4zcudOYmfj_yI1_a-K_KCtuw-1EoX14ki61y8Co681HHSFWOdXtsQPcNpP-xvg/exec';
const LIMITE_ESTOQUE_BAIXO = 2;
let estoquePorProduto = {};
let nomesPorProduto = {}; 
let codigosPorNomeProduto = {};
let estoqueCarregado = false;

function normalizarTextoChave(texto) {
    return String(texto || '')
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
}

function obterVariacoesCodigo(codigo) {
    const codigoLimpo = String(codigo || '').trim();
    if (!codigoLimpo) return [];
    const semZeros = codigoLimpo.replace(/^0+/, '') || codigoLimpo;
    const comZeros = codigoLimpo.padStart(6, '0');
    return [...new Set([codigoLimpo, semZeros, comZeros])];
}

function obterNomeProdutoPorCodigo(codigo) {
    for (const variacao of obterVariacoesCodigo(codigo)) {
        if (Object.prototype.hasOwnProperty.call(nomesPorProduto, variacao)) {
            return nomesPorProduto[variacao];
        }
    }
    return null;
}

function reconstruirIndiceCodigosPorNome() {
    codigosPorNomeProduto = {};
    Object.entries(nomesPorProduto || {}).forEach(([codigo, nome]) => {
        const chave = normalizarTextoChave(nome);
        if (chave && !codigosPorNomeProduto[chave]) {
            codigosPorNomeProduto[chave] = String(codigo).trim();
        }
    });
}

function resolverComponentePeloBanco(peca) {
    const codigoPlanilha = String(peca.codigo || '').trim();
    const nomePlanilha = String(peca.nome || peca.descricao || peca.componente || '').trim();

    // Mantém opções manuais, como "Sem anomalia", sem forçar código.
    if (!codigoPlanilha && normalizarTextoChave(nomePlanilha).includes('SEM ANOMALIA')) {
        return { codigo: '', nome: nomePlanilha || 'Sem anomalia' };
    }

    // 1) Se a Planilha 2 já trouxe um código válido, usa esse código,
    // mas troca a descrição pelo nome oficial do banco DataShock.
    const nomeOficialPorCodigo = obterNomeProdutoPorCodigo(codigoPlanilha);
    if (codigoPlanilha && nomeOficialPorCodigo) {
        return { codigo: codigoPlanilha, nome: nomeOficialPorCodigo };
    }

    // 2) Se a Planilha 2 trouxe apenas o nome do componente, procura o código no banco oficial.
    const chaveNome = normalizarTextoChave(nomePlanilha);
    if (chaveNome && codigosPorNomeProduto[chaveNome]) {
        const codigoOficial = codigosPorNomeProduto[chaveNome];
        return { codigo: codigoOficial, nome: obterNomeProdutoPorCodigo(codigoOficial) || nomePlanilha };
    }

    // 3) Tolerância para nomes com pequenas diferenças: tenta encontrar por inclusão.
    if (chaveNome) {
        const encontrado = Object.entries(nomesPorProduto || {}).find(([, nomeBanco]) => {
            const chaveBanco = normalizarTextoChave(nomeBanco);
            return chaveBanco && (chaveBanco.includes(chaveNome) || chaveNome.includes(chaveBanco));
        });
        if (encontrado) {
            return { codigo: String(encontrado[0]).trim(), nome: encontrado[1] };
        }
    }

    // Fallback: não trava o laudo, mas mantém o que veio da estrutura.
    return { codigo: codigoPlanilha, nome: nomePlanilha || obterNomeProdutoPorCodigo(codigoPlanilha) || 'Componente não identificado no banco' };
}

// ============================================================
// INICIALIZAÇÃO E INTEGRAÇÃO GOOGLE SHEETS
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    const loader = document.getElementById('loader-overlay');
    loader.style.display = 'flex';

    Promise.all([
        fetch(`${GOOGLE_WEBAPP_URL}?action=getEstoque`).then(res => res.json()),
        fetchAgendamentoSeExistir()
    ]).then(([dadosEstoque, dadosAgendamento]) => {
        
        if (dadosEstoque && !dadosEstoque.error) {
            estoquePorProduto = dadosEstoque.estoque || {};
            nomesPorProduto = dadosEstoque.nomes || {};
            reconstruirIndiceCodigosPorNome();
            estoqueCarregado = true;
        }

        if (dadosAgendamento) {
            preencherDadosAgendamento(dadosAgendamento);
        } else {
            document.getElementById('ra').readOnly = false;
            document.getElementById('ra').style.background = '#fff';
            document.getElementById('ra').style.cursor = 'text';
        }

    }).catch(err => {
        console.error('Erro de conexão:', err);
        alert('Falha ao sincronizar com o banco de dados. Verifique a conexão com a internet.');
    }).finally(() => {
        loader.style.display = 'none';
    });
});

function fetchAgendamentoSeExistir() {
    const urlParams = new URLSearchParams(window.location.search);
    const agendamento = urlParams.get('agendamento');
    const codigo = urlParams.get('codigo'); 
    
    if (!agendamento) return Promise.resolve(null);
    document.getElementById('ra').value = agendamento;
    
    let url = `${GOOGLE_WEBAPP_URL}?action=getAgendamento&agendamento=${agendamento}`;
    if (codigo) url += `&codigo=${encodeURIComponent(codigo)}`;
    
    return fetch(url).then(res => res.json());
}

function preencherDadosAgendamento(data) {
    if (data.cliente) document.getElementById('cliente').value = data.cliente;
    if (data.defeito) document.getElementById('defeitoRelatado').value = data.defeito;
    
    if (data.dataEntrada) {
        try {
            let d = new Date(data.dataEntrada);
            if(!isNaN(d)) document.getElementById('dataEntrada').value = d.toISOString().split('T')[0];
        } catch(e) {}
    }

    if (data.horarioEntrada) {
        try {
            let timeStr = data.horarioEntrada;
            if (timeStr.includes('T')) {
                document.getElementById('horaEntrada').value = new Date(timeStr).toISOString().substring(11, 16);
            } else {
                document.getElementById('horaEntrada').value = timeStr.substring(0, 5);
            }
        } catch(e) {}
    }

    if (data.codigoEquipamento) {
        document.getElementById('codigoMaquina').value = data.codigoEquipamento;
        document.getElementById('codigoMaquina').dispatchEvent(new Event('input'));
    }
}

// ============================================================
// BUSCA DINÂMICA: CÓDIGO -> NOME -> PEÇAS (PLANILHA 2)
// ============================================================
let timeoutBusca = null;

document.getElementById('codigoMaquina').addEventListener('input', function() {
    clearTimeout(timeoutBusca);
    const codigo = this.value.trim();
    
    if (!codigo) {
        document.getElementById('nomeMaquina').value = '';
        document.getElementById('pecasBox').classList.add('hidden');
        document.getElementById("selecaoServico").disabled = true;
        return;
    }

    // Busca o nome do equipamento na base local já carregada (DataShock da Planilha 1)
    const nomeEncontrado = obterNomeProdutoPorCodigo(codigo);
    
    if (nomeEncontrado) {
        document.getElementById('nomeMaquina').value = nomeEncontrado;
        
        // Aguarda 500ms depois que o usuário parar de digitar para puxar as peças da Planilha 2
        timeoutBusca = setTimeout(() => {
            carregarPecasDinamicamente(codigo, nomeEncontrado);
        }, 500);

    } else {
        document.getElementById('nomeMaquina').value = 'Equipamento não localizado no DataShock';
        document.getElementById('pecasBox').classList.add('hidden');
        document.getElementById("selecaoServico").disabled = true;
    }
});

function carregarPecasDinamicamente(codigoEquipamento, nomeEquipamento) {
  const pecasBox = document.getElementById("pecasBox");
  const lista = document.getElementById("pecasLista");
  const selectServico = document.getElementById("selecaoServico");

  pecasBox.classList.remove("hidden");
  lista.innerHTML = "<p style='color: var(--cor-primaria); font-weight:bold;'>Conectando ao banco de peças (Planilha 2)...</p>";
  selectServico.innerHTML = '<option value="">-- Selecione o serviço --</option>';
  selectServico.disabled = true;

  // Busca na Planilha 2 a aba referente a este código
  fetch(`${GOOGLE_WEBAPP_URL}?action=getPecas&codigoEquip=${encodeURIComponent(codigoEquipamento)}`)
    .then(res => res.json())
    .then(data => {
        lista.innerHTML = "";

        if (data.erro) {
            lista.innerHTML = `<p style='color:red;'>Nenhuma lista de peças vinculada à aba "${codigoEquipamento}". Verifique se a aba existe na planilha de Estruturas.</p>`;
        } else if (data.pecas && data.pecas.length > 0) {
            lista.innerHTML = `<h4>Componentes Disponíveis</h4>`;
            data.pecas.forEach(peca => {
                const componente = resolverComponentePeloBanco(peca);
                lista.innerHTML += criarHtmlPeca(componente.codigo, componente.nome, codigoEquipamento);
            });
            aplicarEstoqueNasPecas();
            
            // Define categoria baseada na nomenclatura (WAVE é comercial)
            const tipo = nomeEquipamento.toUpperCase().includes('WAVE') ? 'comercial' : 'residencial';
            if (tabelaServicos[tipo]) {
                selectServico.disabled = false;
                tabelaServicos[tipo].forEach(servico => {
                    const option = document.createElement("option");
                    option.value = JSON.stringify(servico); 
                    option.text = `${servico.nivel} - ${servico.desc}`;
                    selectServico.appendChild(option);
                });
            }
        } else {
            lista.innerHTML = `<p>Aba vazia.</p>`;
        }
    })
    .catch(err => {
        console.error(err);
        lista.innerHTML = "<p style='color:red;'>Erro ao puxar componentes da planilha.</p>";
    });
}

// ============================================================
// UTILIDADES DE ESTOQUE E CRIAÇÃO DO HTML DA PEÇA
// ============================================================
function formatarQuantidadeEstoque(valor) { if (valor === null || valor === undefined) return 'N/I'; return Number(valor).toLocaleString('pt-BR', { maximumFractionDigits: 2 }); }

function obterEstoqueProduto(codigo) {
    const codigoNormalizado = String(codigo || '').trim();
    if (!codigoNormalizado || !estoqueCarregado) return null;
    if (Object.prototype.hasOwnProperty.call(estoquePorProduto, codigoNormalizado)) return estoquePorProduto[codigoNormalizado];
    return 0;
}

function classeEstoque(quantidade) { if (quantidade === null || quantidade === undefined) return ''; if (quantidade <= 0) return 'estoque-zerado'; if (quantidade <= LIMITE_ESTOQUE_BAIXO) return 'estoque-baixo'; return ''; }
function textoEstoque(quantidade) { if (quantidade === null || quantidade === undefined) return 'Estoque: N/I'; return `Estoque: ${formatarQuantidadeEstoque(quantidade)}`; }

function aplicarEstoqueNasPecas() {
    document.querySelectorAll('.peca-item').forEach(item => {
        const checkbox = item.querySelector('input[type="checkbox"]');
        const badge = item.querySelector('.estoque-badge');
        if (!checkbox || !badge) return;
        item.classList.remove('estoque-baixo', 'estoque-zerado');
        const estoque = obterEstoqueProduto(checkbox.value);
        checkbox.dataset.estoque = estoque === null ? '' : String(estoque);
        badge.textContent = textoEstoque(estoque);
        const classe = classeEstoque(estoque);
        if (classe) item.classList.add(classe);
    });
}

function criarHtmlPeca(codigo, nomePeca, codigoEquipamento) {
    const estoque = obterEstoqueProduto(codigo);
    const estoqueClasse = classeEstoque(estoque);
    const estoqueValor = estoque === null ? '' : String(estoque);
    const letra = nomePeca ? nomePeca.charAt(0).toUpperCase() : '?';

    // LÓGICA DAS IMAGENS DINÂMICAS: Tenta .jpg > .png > Placeholder com a letra
    const codEqSanitizado = encodeURIComponent(String(codigoEquipamento).trim());
    const codPecaSanitizado = encodeURIComponent(String(codigo).trim());
    
    let imagemHtml = '';
    if (codigo) {
        // Se a imagem JPG falhar (onerror), tenta carregar a PNG. Se a PNG falhar, exibe o fallback da letra.
        imagemHtml = `<img src="imagens/${codEqSanitizado}/${codPecaSanitizado}.jpg" class="peca-img" alt="${nomePeca}" 
                       onerror="if(!this.dataset.triedpng){ this.dataset.triedpng='true'; this.src='imagens/${codEqSanitizado}/${codPecaSanitizado}.png'; } else { this.outerHTML='<div class=\\'peca-img-placeholder\\'>${letra}</div>'; }">`;
    } else {
        // Fallback direto (ex: opção "Sem anomalia" que não tem código)
        imagemHtml = `<div class="peca-img-placeholder">${letra}</div>`;
    }

    return `
    <div class="peca-item ${estoqueClasse}">
        <label class="peca-info">
        <input type="checkbox" value="${codigo}" data-nome="${nomePeca}" data-estoque="${estoqueValor}" onchange="togglePecaOpcoes(this)">
        ${imagemHtml}
        <span class="peca-info-texto">
            <span>${nomePeca} ${codigo ? `(${codigo})` : ''}</span>
            ${codigo ? `<span class="estoque-badge">${textoEstoque(estoque)}</span>` : ''}
        </span>
        </label>
        <div class="opcoes-peca">
        <label class="quantidade-label">
            Quantidade:
            <input type="number" class="quantidade-input" value="1" min="1">
        </label>
        <div class="cor-selecao">
            <input type="radio" name="cor_${codigo}" value="verde" id="cor_v_${codigo}" checked>
            <label for="cor_v_${codigo}">V</label>

            <input type="radio" name="cor_${codigo}" value="azul" id="cor_a_${codigo}">
            <label for="cor_a_${codigo}">A</label>

            <input type="radio" name="cor_${codigo}" value="rosa" id="cor_r_${codigo}">
            <label for="cor_r_${codigo}">R</label>
        </div>
        </div>
    </div>
    `;
}

function togglePecaOpcoes(checkbox) {
    const container = checkbox.closest('.peca-item');
    const opcoes = container.querySelector('.opcoes-peca');
    opcoes.style.display = checkbox.checked ? 'flex' : 'none';
}

const imagensParaLaudo = [];
document.getElementById("fotos").addEventListener("change", function(event) {
    const preview = document.getElementById("previewFotos");
    preview.innerHTML = "";
    imagensParaLaudo.length = 0; 

    for (const file of event.target.files) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.classList.add("preview-img");
            preview.appendChild(img);
            imagensParaLaudo.push(e.target.result); 
        }
        reader.readAsDataURL(file);
    }
});


// ============================================================
// MARCAR RELATÓRIO GERADO NA PLANILHA
// Atualiza a mesma linha puxada pelo ID/RA + Código do Equipamento:
// Coluna H = liberação | Coluna M = Data | Coluna N = Hora
// ============================================================
function marcarRelatorioGeradoNaPlanilha(laudoData) {
    const payload = {
        action: 'marcarRelatorioGerado',
        ra: laudoData.ra,
        codigoEquipamento: laudoData.codigoMaquina
    };

    return fetch(GOOGLE_WEBAPP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(res => {
        if (!res.ok) {
            console.warn('Não foi possível marcar relatório como gerado:', res);
        } else {
            console.log('Relatório marcado como gerado:', res);
        }
        return res;
    })
    .catch(err => {
        console.error('Erro ao marcar relatório como gerado:', err);
        return { ok: false, error: err.message };
    });
}

// ============================================================
// GERAÇÃO DO LAUDO
// ============================================================
function gerarLaudo() {
    const erros = [];
    const cliente = document.getElementById("cliente").value.trim();
    if (cliente === '') erros.push("O campo 'Cliente' é obrigatório.");
    if (document.getElementById("ra").value.trim() === '') erros.push("O campo 'RA/ID' é obrigatório.");
    if (document.getElementById("codigoMaquina").value.trim() === '') erros.push("O campo 'Código do Equipamento' é obrigatório.");
    if (document.getElementById("nomeMaquina").value.trim() === '' || document.getElementById("nomeMaquina").value.includes('não localizado')) erros.push("O campo 'Nome do Equipamento' deve ser válido.");
    if (document.getElementById("dataEntrada").value === '') erros.push("O campo 'Data de Entrada' é obrigatório.");
    if (document.getElementById("horaEntrada").value === '') erros.push("O campo 'Hora de Entrada' é obrigatório.");
    if (document.getElementById("defeitoRelatado").value.trim() === '') erros.push("O campo 'Defeito Relatado pelo Cliente' é obrigatório.");
    if (document.getElementById("obsTecnicas").value.trim() === '') erros.push("O campo 'Observações Técnicas' é obrigatório.");
    if (imagensParaLaudo.length === 0) erros.push("É necessário anexar pelo menos uma foto.");
    
    const selectServico = document.getElementById("selecaoServico");
    if (selectServico.value === "") erros.push("É obrigatório selecionar a 'Classificação do Serviço'.");

    const garantia = document.getElementById("garantia").value;
    if (garantia === '') erros.push("É obrigatório selecionar se o produto está em 'Garantia'.");

    const pecasSelecionadas = document.querySelectorAll('#pecasLista input[type="checkbox"]:checked');
    const pecasBoxVisivel = !document.getElementById('pecasBox').classList.contains('hidden');

    if (pecasBoxVisivel && pecasSelecionadas.length === 0) {
      erros.push("É obrigatório selecionar pelo menos uma peça (ou a opção 'Sem anomalia').");
    }

    if (erros.length > 0) {
        alert("Por favor, preencha os seguintes campos antes de gerar o laudo:\n\n- " + erros.join("\n- "));
        return;
    }

    let dadosServico = {};
    try {
        dadosServico = JSON.parse(selectServico.value);
    } catch(e) {
        dadosServico = { nivel: "N/A", codigo: "N/A", desc: "N/A", detalhe: "N/A" };
    }

    const coresMap = {
        verde: { background: '#21b92d', text: '#000000' },
        azul: { background: '#205fe1', text: '#000000' },
        rosa: { background: '#ff00ff', text: '#000000' }
    };

    const dataGeracao = new Date().toLocaleDateString('pt-BR');

    const laudoData = {
        ra: document.getElementById("ra").value,
        dataEntrada: new Date(document.getElementById("dataEntrada").value).toLocaleDateString('pt-BR', {timeZone: 'UTC'}),
        horaEntrada: document.getElementById("horaEntrada").value,
        cliente: cliente,
        codigoMaquina: document.getElementById("codigoMaquina").value,
        nomeMaquina: document.getElementById("nomeMaquina").value,
        equipamento: document.getElementById("nomeMaquina").value,
        codRobo: document.getElementById("codRobo").value,
        codFonte: document.getElementById("codFonte").value,
        codMotor: document.getElementById("codMotor").value,
        codBateria: document.getElementById("codBateria").value,
        acessorios: Array.from(document.querySelectorAll('input[name="acessorios"]:checked')).map(el => el.value).join(', ') || 'Nenhum',
        defeitoRelatado: document.getElementById("defeitoRelatado").value,
        obsTecnicas: document.getElementById("obsTecnicas").value.replace(/\n/g, '<br>'),
        obsGerais: document.getElementById("obsGerais").value.replace(/\n/g, '<br>'),
        pecasSelecionadas: Array.from(document.querySelectorAll('#pecasLista input[type="checkbox"]:checked')).map(el => {
            const container = el.closest('.peca-item');
            const quantidadeInput = container.querySelector('.quantidade-input');
            const corInput = container.querySelector('input[name="cor_' + el.value + '"]:checked');
            const estoque = el.dataset.estoque === '' ? null : Number(el.dataset.estoque);
            return { codigo: el.value, nome: el.dataset.nome, quantidade: quantidadeInput.value, estoque: estoque, cor: corInput ? corInput.value : 'verde' };
        }),
        imagens: imagensParaLaudo,
        dataGeracao: dataGeracao, 
        servico: dadosServico,
        garantia: garantia
    };

    // Assim que o técnico clica em "Gerar Laudo Técnico", atualiza a linha original da planilha.
    marcarRelatorioGeradoNaPlanilha(laudoData);

    const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const caminhoImagemLegenda = basePath + 'imagens/tabelacores.jpg';
    const caminhoLogo = basePath + 'imagens/logolaudo.jpg';

    const novaJanela = window.open('', '_blank');
    novaJanela.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Laudo Técnico - RA/ID ${laudoData.ra}</title>
          <style>
            body { font-family: Arial, sans-serif; margin: 0; background-color: #fff; color: #333; }

              font-size: 14px; font-weight: bold; color: #fff;
              background-color: #002060; padding: 8px;
              margin: 0 0 15px 0; border-radius: 4px;
            }
            .fotos-grid {
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 10px; margin-top: 10px;
            }
            .fotos-grid img { 
              width: 100%; height: 5cm; object-fit: contain; border-radius: 4px; 
              border: 1px solid #ccc; background-color: #f9f9f9; 
            }
            .header-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; border: 2px solid #000; }
            .header-table td { border: 1px solid #000; padding: 5px; vertical-align: middle; }
            .logo-cell { width: 200px; text-align: center; padding: 10px; }
            .logo-cell img { max-width: 180px; height: auto; }
            .info-table { width: 100%; }

          <script>
            const laudoDataParaEnvio = ${JSON.stringify(laudoData)};
            const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzCfu6XW3hI3uuKaQj5DCCDKxDlsW1IdRketmDlWtcv8sE8KF1wk28VAmHwm1IsMbxY/exec';
            const UPLOAD_TOKEN = 'MEU_TOKEN_SEGURO_123';
            function salvarNaPlanilha() {
              const payload = {
                token: UPLOAD_TOKEN,
                ra: laudoDataParaEnvio.ra,
                cliente: laudoDataParaEnvio.cliente,
                equipamento: laudoDataParaEnvio.equipamento,
                dataEntrada: laudoDataParaEnvio.dataEntrada,
                horaEntrada: laudoDataParaEnvio.horaEntrada,
                acessorios: laudoDataParaEnvio.acessorios,
                codRobo: laudoDataParaEnvio.codRobo,
                codFonte: laudoDataParaEnvio.codFonte,
                codMotor: laudoDataParaEnvio.codMotor,
                codBateria: laudoDataParaEnvio.codBateria,
                
                // Mapeando os novos campos para colunas (ajuste o Google Script se necessário)
                // Para não quebrar sua planilha, estou enviando o código e nível no campo antigo de tempoAnalise
                tempoAnalise: laudoDataParaEnvio.servico.codigo + " - " + laudoDataParaEnvio.servico.nivel, 
                
                garantia: laudoDataParaEnvio.garantia,
                defeitoRelatado: laudoDataParaEnvio.defeitoRelatado.replace(/<br>/g, "\\n"),
                obsTecnicas: laudoDataParaEnvio.obsTecnicas.replace(/<br>/g, "\\n"),
                obsGerais: laudoDataParaEnvio.obsGerais.replace(/<br>/g, "\\n"),
                pecasSelecionadas: laudoDataParaEnvio.pecasSelecionadas
              };

              const btnSalvar = document.querySelector('.save-btn');
              btnSalvar.disabled = true;
              btnSalvar.textContent = 'Enviando...';

              fetch(GOOGLE_WEBAPP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
              })
              .then(r => r.text())
              .then(txt => {
                try {
                  const res = JSON.parse(txt);
                  if (res.ok) {
                    alert('Dados salvos na planilha com sucesso!');
                    btnSalvar.textContent = 'Salvo com Sucesso!';
                  } else {
                    alert('Falha ao salvar na planilha: ' + (res.error || 'Erro desconhecido'));
                    btnSalvar.disabled = false;
                    btnSalvar.textContent = 'Salvar na Planilha';
                  }
                } catch {
                  alert('Upload concluído (sem resposta JSON). Verifique a planilha.');
                  btnSalvar.textContent = 'Salvo!';
                }
              })
              .catch(err => {
                console.error(err);
                alert('Erro de conexão ao salvar na planilha: ' + err);
                btnSalvar.disabled = false;
                btnSalvar.textContent = 'Salvar na Planilha';
              });
            }

          <\/script>

<div class="image-lightbox" id="imageLightbox" aria-hidden="true">
  <div class="image-lightbox-content">
    <button type="button" class="image-lightbox-close" id="imageLightboxClose" aria-label="Fechar imagem">&times;</button>
    <img src="" alt="" id="imageLightboxImg">
    <div class="image-lightbox-title" id="imageLightboxTitle"></div>
  </div>
</div>

<script>
(function melhoriasVisuaisLaudo() {
  function iniciar() {
    const botao = document.getElementById("btnGerarLaudo");

    function campoTemValor(id) {
      const campo = document.getElementById(id);
      return campo && String(campo.value || "").trim() !== "";
    }

    function equipamentoValido() {
      const nome = document.getElementById("nomeMaquina");
      return nome && String(nome.value || "").trim() !== "" && !String(nome.value || "").includes("não localizado");
    }

    function formularioCompleto() {
      const camposObrigatorios = [
        "cliente",
        "ra",
        "codigoMaquina",
        "dataEntrada",
        "horaEntrada",
        "garantia",
        "defeitoRelatado",
        "obsTecnicas"
      ];

      const camposOk = camposObrigatorios.every(campoTemValor);
      const servico = document.getElementById("selecaoServico");
      const servicoOk = servico && !servico.disabled && String(servico.value || "").trim() !== "";
      const fotosOk = typeof imagensParaLaudo !== "undefined" && imagensParaLaudo.length > 0;

      const pecasBox = document.getElementById("pecasBox");
      const pecasVisiveis = pecasBox && !pecasBox.classList.contains("hidden");
      const pecasOk = !pecasVisiveis || document.querySelectorAll('#pecasLista input[type="checkbox"]:checked').length > 0;

      return camposOk && equipamentoValido() && servicoOk && fotosOk && pecasOk;
    }

    function atualizarBotao() {
      if (!botao) return;
      const completo = formularioCompleto();
      botao.classList.toggle("btn-disabled", !completo);
      botao.setAttribute("aria-disabled", completo ? "false" : "true");
      botao.title = completo
        ? "Gerar laudo técnico"
        : "Preencha todos os campos obrigatórios para finalizar";
    }

    if (botao) {
      const gerarOriginal = window.gerarLaudo;
      if (typeof gerarOriginal === "function") {
        window.gerarLaudo = function() {
          atualizarBotao();
          if (!formularioCompleto()) {
            alert("Preencha todos os campos obrigatórios antes de finalizar o laudo.");
            return;
          }
          return gerarOriginal.apply(this, arguments);
        };
      }

      document.addEventListener("input", atualizarBotao, true);
      document.addEventListener("change", function() {
        setTimeout(atualizarBotao, 40);
      }, true);
      document.addEventListener("click", function(event) {
        if (event.target.closest("#pecasLista")) {
          setTimeout(atualizarBotao, 40);
        }
      }, true);

      // Como alguns campos são preenchidos via planilha/fetch, acompanha por alguns segundos.
      let tentativas = 0;
      const timer = setInterval(function() {
        atualizarBotao();
        tentativas++;
        if (tentativas > 80) clearInterval(timer);
      }, 250);

      atualizarBotao();
    }

    const lightbox = document.getElementById("imageLightbox");
    const lightboxImg = document.getElementById("imageLightboxImg");
    const lightboxTitle = document.getElementById("imageLightboxTitle");
    const closeBtn = document.getElementById("imageLightboxClose");

    function abrirImagem(img) {
      if (!lightbox || !lightboxImg || !lightboxTitle) return;
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "Imagem do componente";
      lightboxTitle.textContent = img.alt || "Imagem do componente";
      lightbox.classList.add("show");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function fecharImagem() {
      if (!lightbox || !lightboxImg) return;
      lightbox.classList.remove("show");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImg.src = "";
      document.body.style.overflow = "";
    }

    document.addEventListener("click", function(event) {
      const img = event.target.closest(".peca-img");
      if (img) {
        event.preventDefault();
        event.stopPropagation();
        abrirImagem(img);
        return;
      }

      if (event.target === lightbox) {
        fecharImagem();
      }
    }, true);

    if (closeBtn) {
      closeBtn.addEventListener("click", fecharImagem);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape" && lightbox && lightbox.classList.contains("show")) {
        fecharImagem();
      }
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", iniciar);
  } else {
    iniciar();
  }
})();
</script>


<script>
(function ativarAlternanciaDeTema() {
  function iniciar() {
    const btn = document.getElementById("themeToggleBtn");
    if (!btn) return;

    const icon = btn.querySelector(".theme-icon");
    const label = btn.querySelector(".theme-label");

    function aplicarTema(tema) {
      const modoClaro = tema === "light";
      document.body.classList.toggle("light-mode", modoClaro);

      if (icon) icon.textContent = modoClaro ? "🌙" : "☀️";
      if (label) label.textContent = modoClaro ? "Modo noturno" : "Modo claro";

      localStorage.setItem("temaGeradorRelatorio", modoClaro ? "light" : "dark");
    }

    aplicarTema(localStorage.getItem("temaGeradorRelatorio") || "dark");

    btn.addEventListener("click", function() {
      aplicarTema(document.body.classList.contains("light-mode") ? "dark" : "light");
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", iniciar);
  } else {
    iniciar();
  }
})();
</script>
